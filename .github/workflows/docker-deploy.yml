name: Docker Publish And Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: docker-deploy-main
  cancel-in-progress: true

env:
  IMAGE_REPOSITORY: c-client-m
  VITE_APP_TITLE: C-CLIENT-M
  VITE_PROJECT_ROOT: /workspace/company
  VITE_BRIDGE_HTTP_ORIGIN: ""
  APP_PORT: 4275
  BRIDGE_PROXY_TARGET: http://host.docker.internal:4285

jobs:
  docker:
    runs-on: ubuntu-latest

    outputs:
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login To Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute Image Tag
        id: meta
        shell: bash
        run: |
          TAG_SHA="${GITHUB_SHA::12}"
          echo "tag=${TAG_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build And Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_REPOSITORY }}:latest
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_REPOSITORY }}:${{ steps.meta.outputs.tag }}
          build-args: |
            VITE_APP_TITLE=${{ env.VITE_APP_TITLE }}
            VITE_BRIDGE_HTTP_ORIGIN=${{ env.VITE_BRIDGE_HTTP_ORIGIN }}
            VITE_PROJECT_ROOT=${{ env.VITE_PROJECT_ROOT }}
            VITE_CCLIENT_KEY=${{ secrets.VITE_CCLIENT_KEY }}

  deploy:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Deploy To Server
        uses: appleboy/ssh-action@v1.2.2
        env:
          APP_LOGIN_PASSWORD: ${{ secrets.APP_LOGIN_PASSWORD }}
          APP_PORT: ${{ env.APP_PORT }}
          BRIDGE_PROXY_TARGET: ${{ secrets.BRIDGE_PROXY_TARGET }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_REPOSITORY: ${{ env.IMAGE_REPOSITORY }}
          TAG: ${{ needs.docker.outputs.tag }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          envs: APP_LOGIN_PASSWORD,APP_PORT,BRIDGE_PROXY_TARGET,DEPLOY_PATH,DOCKERHUB_TOKEN,DOCKERHUB_USERNAME,IMAGE_REPOSITORY,TAG
          script: |
            set -eu
            IMAGE="docker.io/${DOCKERHUB_USERNAME}/${IMAGE_REPOSITORY}"
            mkdir -p "$DEPLOY_PATH"
            cat > "$DEPLOY_PATH/compose.yaml" <<EOF
            services:
              c-client-m:
                image: ${IMAGE}:${TAG}
                container_name: c-client-m
                restart: unless-stopped
                ports:
                  - "${APP_PORT}:80"
                environment:
                  HOST: 0.0.0.0
                  PORT: 80
                  APP_LOGIN_PASSWORD: ${APP_LOGIN_PASSWORD}
                  BRIDGE_PROXY_TARGET: ${BRIDGE_PROXY_TARGET}
                extra_hosts:
                  - "host.docker.internal:host-gateway"
            EOF
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            cd "$DEPLOY_PATH"
            docker compose pull
            docker compose up -d
            docker image prune -f
