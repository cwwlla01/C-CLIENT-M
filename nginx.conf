upstream c_client_m_frontend {
  server 127.0.0.1:4275;
}

upstream c_client_bridge {
  server 127.0.0.1:4285;
}

server {
  listen 80;
  server_name _;

  client_max_body_size 25m;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Real-IP $remote_addr;

  # Auth endpoints stay on the frontend service because Vercel / preview auth
  # is implemented there.
  location /api/auth/ {
    proxy_pass http://c_client_m_frontend;
  }

  # Business APIs go to the bridge service.
  location /api/ {
    proxy_pass http://c_client_bridge;
  }

  location = /health {
    proxy_pass http://c_client_bridge/health;
  }

  location / {
    proxy_pass http://c_client_m_frontend;
  }
}
